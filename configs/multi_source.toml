# DarkDriving -- Multi-source training config
# Trains on nuScenes day (synthetic pairs) + KITTI (synthetic pairs)
# Tests on nuScenes real night images
# Target: surpass paper's 9.5K pairs with 37K+ pairs

[model]
name = "retinexformer"
in_channels = 3
out_channels = 3
embed_dim = 32
num_blocks = 4
num_heads = 4

[data]
dataset = "multi_source"
nuscenes_root = "/mnt/forge-data/datasets/nuscenes"
kitti_root = "/mnt/forge-data/datasets/kitti"
input_size = [512, 512]
num_workers = 4
pin_memory = true
gamma_range = [2.0, 5.0]
noise_std = 0.02

[training]
batch_size = 4
learning_rate = 0.001
epochs = 100
optimizer = "adam"
beta1 = 0.9
beta2 = 0.999
weight_decay = 0.0
scheduler = "cosine"
warmup_ratio = 0.05
min_lr = 1e-6
precision = "fp32"
gradient_accumulation = 1
max_grad_norm = 1.0
seed = 42

[loss]
name = "l1"
l1_weight = 1.0
ssim_weight = 0.0

[augmentation]
random_crop = true
crop_size = [512, 512]
random_rotation = true
rotation_degrees = 90
horizontal_flip = true
flip_prob = 0.5

[checkpoint]
output_dir = "/mnt/artifacts-datai/checkpoints/project_darkdriving"
save_every_n_steps = 500
keep_top_k = 2
metric = "val_psnr"
mode = "max"

[early_stopping]
enabled = true
patience = 15
min_delta = 0.001

[logging]
log_dir = "/mnt/artifacts-datai/logs/project_darkdriving"
tensorboard_dir = "/mnt/artifacts-datai/tensorboard/project_darkdriving"

[evaluation]
metrics_fullref = ["psnr", "ssim"]
metrics_noref = []
metrics_det2d = []
